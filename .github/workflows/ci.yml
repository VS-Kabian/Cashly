name: CI

on:
  pull_request:
  workflow_dispatch:
    inputs:
      run_supabase_integration:
        description: Run the disposable local Supabase integration gate.
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  quality:
    name: Unit, lint, typecheck, and build
    runs-on: ubuntu-latest
    env:
      # These are non-secret CI fixtures used only by the production-build validator.
      VITE_SUPABASE_URL: https://ci-build.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: ci-public-build-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npx tsc -b
      - run: npm run build

  supabase-integration:
    name: Optional disposable Supabase integration gate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_supabase_integration == true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
      - name: Run Supabase integration tests
        env:
          CASHLY_RUN_SUPABASE_INTEGRATION: '1'
          CASHLY_SUPABASE_TARGET: local
        run: npm run test:integration
